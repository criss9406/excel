<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titulo %}PyAutomation{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/css/styles.css') }}">
</head>
<body>
    <header class="topbar">
        <a href="/" class="brand">PyAutomation · Demos</a>
        <span class="brand-sub">Procesos de backoffice con codigo</span>
    </header>

    <main class="page">
        {% block contenido %}{% endblock %}
    </main>

    <footer class="footer">
        <span>Hecho con Python · FastAPI · pandas</span>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
